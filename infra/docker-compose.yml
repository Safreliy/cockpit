services:
  postgres:
    image: postgres:16
    container_name: cockpit-postgres
    environment:
      POSTGRES_DB: cockpit
      POSTGRES_USER: cockpit
      POSTGRES_PASSWORD: cockpit
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on
      - -c
      - max_connections=200
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cockpit -d cockpit"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cockpit-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://cockpit:cockpit@postgres:5432/cockpit?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yaml
    volumes:
      - ./postgres_exporter/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: cockpit-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - postgres_exporter

  cockpit_backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: cockpit-backend
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: cockpit
      PGUSER: cockpit
      PGPASSWORD: cockpit
      AI_AGENT_BASE_URL: ${AI_AGENT_BASE_URL:-}
      AI_AGENT_USER_ID: ${AI_AGENT_USER_ID:-00000000-0000-4000-8000-000000000001}
      AI_AGENT_SOURCE: ${AI_AGENT_SOURCE:-cockpit}
      AI_AGENT_MODEL_ID: ${AI_AGENT_MODEL_ID:-}
      AI_AGENT_MCP_URL: ${AI_AGENT_MCP_URL:-}
      AI_AGENT_MCP_IDS: ${AI_AGENT_MCP_IDS:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8088/api/snapshot', timeout=2).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
  promdata:
