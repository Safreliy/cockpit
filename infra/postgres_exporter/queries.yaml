pg_stat_activity_cockpit:
  query: |
    SELECT
      datname,
      count(*)::float AS connections,
      count(*) FILTER (WHERE state = 'active')::float AS active_connections,
      count(*) FILTER (WHERE wait_event_type IS NOT NULL)::float AS waiting_connections
    FROM pg_stat_activity
    WHERE datname IS NOT NULL
    GROUP BY datname
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - connections:
        usage: "GAUGE"
        description: "Total connections by database"
    - active_connections:
        usage: "GAUGE"
        description: "Active connections by database"
    - waiting_connections:
        usage: "GAUGE"
        description: "Connections currently waiting by database"

pg_database_io_cockpit:
  query: |
    SELECT
      datname,
      blks_read::float AS blks_read,
      blks_hit::float AS blks_hit,
      blk_read_time::float AS blk_read_time_ms,
      blk_write_time::float AS blk_write_time_ms
    FROM pg_stat_database
    WHERE datname IS NOT NULL
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - blks_read:
        usage: "COUNTER"
        description: "Disk blocks read"
    - blks_hit:
        usage: "COUNTER"
        description: "Buffer cache hits"
    - blk_read_time_ms:
        usage: "COUNTER"
        description: "Time spent reading data file blocks, in milliseconds"
    - blk_write_time_ms:
        usage: "COUNTER"
        description: "Time spent writing data file blocks, in milliseconds"
