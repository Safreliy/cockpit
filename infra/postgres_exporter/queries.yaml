pg_stat_activity_cockpit:
  query: |
    SELECT
      datname,
      count(*)::float AS connections,
      count(*) FILTER (WHERE state = 'active')::float AS active_connections,
      count(*) FILTER (WHERE wait_event_type IS NOT NULL)::float AS waiting_connections
    FROM pg_stat_activity
    WHERE datname IS NOT NULL
    GROUP BY datname
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - connections:
        usage: "GAUGE"
        description: "Total connections by database"
    - active_connections:
        usage: "GAUGE"
        description: "Active connections by database"
    - waiting_connections:
        usage: "GAUGE"
        description: "Connections currently waiting by database"

pg_database_io_cockpit:
  query: |
    SELECT
      datname,
      blks_read::float AS blks_read,
      blks_hit::float AS blks_hit,
      blk_read_time::float AS blk_read_time_ms,
      blk_write_time::float AS blk_write_time_ms
    FROM pg_stat_database
    WHERE datname IS NOT NULL
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - blks_read:
        usage: "COUNTER"
        description: "Disk blocks read"
    - blks_hit:
        usage: "COUNTER"
        description: "Buffer cache hits"
    - blk_read_time_ms:
        usage: "COUNTER"
        description: "Time spent reading data file blocks, in milliseconds"
    - blk_write_time_ms:
        usage: "COUNTER"
        description: "Time spent writing data file blocks, in milliseconds"

pg_vacuum_activity_cockpit:
  query: |
    SELECT
      datname,
      count(*) FILTER (WHERE query ILIKE 'vacuum%')::float AS active_vacuum_sessions,
      count(*) FILTER (WHERE backend_type = 'autovacuum worker')::float AS active_autovacuum_sessions,
      coalesce(max(extract(epoch FROM now() - query_start)) FILTER (WHERE query ILIKE 'vacuum%'), 0)::float AS vacuum_max_elapsed_seconds
    FROM pg_stat_activity
    WHERE datname IS NOT NULL
    GROUP BY datname
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - active_vacuum_sessions:
        usage: "GAUGE"
        description: "Manual VACUUM sessions currently running"
    - active_autovacuum_sessions:
        usage: "GAUGE"
        description: "Autovacuum workers currently running"
    - vacuum_max_elapsed_seconds:
        usage: "GAUGE"
        description: "Longest currently running VACUUM duration in seconds"

pg_config_reload_cockpit:
  query: |
    SELECT extract(epoch FROM pg_conf_load_time())::float AS reload_time_seconds
  metrics:
    - reload_time_seconds:
        usage: "GAUGE"
        description: "Last PostgreSQL configuration load time as unix timestamp"

pg_settings_cockpit:
  query: |
    SELECT
      name,
      setting,
      coalesce(unit, '') AS unit,
      context,
      pending_restart::text AS pending_restart,
      1::float AS info
    FROM pg_settings
    WHERE name IN (
      'max_connections',
      'shared_buffers',
      'work_mem',
      'maintenance_work_mem',
      'effective_cache_size',
      'random_page_cost',
      'max_parallel_workers',
      'max_parallel_workers_per_gather',
      'autovacuum',
      'autovacuum_max_workers',
      'autovacuum_vacuum_cost_delay',
      'autovacuum_vacuum_cost_limit',
      'log_min_duration_statement',
      'track_io_timing'
    )
  metrics:
    - name:
        usage: "LABEL"
        description: "PostgreSQL setting name"
    - setting:
        usage: "LABEL"
        description: "Current setting value"
    - unit:
        usage: "LABEL"
        description: "Setting unit"
    - context:
        usage: "LABEL"
        description: "Setting context"
    - pending_restart:
        usage: "LABEL"
        description: "Whether this setting has a pending restart"
    - info:
        usage: "GAUGE"
        description: "Selected PostgreSQL settings for cockpit change detection"
